<!DOCTYPE html>
<html>
<head><style>img { max-width: 300px; height: auto; } .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }</style></head>

      "IMG_7638.HEIC.jpeg", "IMG_7656.HEIC.jpeg", "IMG_7704.HEIC.jpeg", "IMG_7738.HEIC.jpeg", 
      "IMG_7852.HEIC.jpeg", "IMG_8010.HEIC.jpeg", "IMG_8132.JPG.jpeg.jpeg", "IMG_8133.JPG.jpeg.jpeg", 
      "IMG_8157.HEIC.jpeg"

</body>
</html>
